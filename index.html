<style>/* Neon Navigation Bar */
.neon-nav {
  width: 100%;
  padding: 15px 0;
  text-align: center;
  background: rgba(0,0,0,0.3);
  border-bottom: 3px solid #ff4df0;
  box-shadow: 0 0 20px #ff4df0;
  position: sticky;
  top: 0;
  z-index: 999;
}

.neon-nav a {
  margin: 0 20px;
  font-size: 20px;
  color: #ffb7ff;
  text-shadow: 0 0 10px #ff4df0;
  transition: 0.3s ease;
}

.neon-nav a:hover {
  color: #ffffff;
  text-shadow: 0 0 20px #ff4df0, 0 0 40px #ff4df0;
}
<style>/* Floating hearts */
